version: '3.8'

services:
  # Generator service
  generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: echo-generator
    environment:
      - LOG_LEVEL=info
    volumes:
      # Mount config file
      - ./config.yaml:/app/config.yaml:ro
      # Mount output directories
      - ./logs:/app/logs
      - ./events:/app/events
    ports:
      # Prometheus metrics endpoint
      - "8080:8080"
    command:
      - "-config"
      - "/app/config.yaml"
      - "-log-level"
      - "info"
      - "-events-log"
      - "/app/events/events.jsonl"
      - "-metrics"
      - ":8080"
    networks:
      - echo-network
    depends_on:
      - prometheus
    restart: on-failure:3

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: echo-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - echo-network
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: echo-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - echo-network
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:

networks:
  echo-network:
    driver: bridge
